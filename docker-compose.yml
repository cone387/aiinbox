version: '3.8'

services:
  aiinbox:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - AIINBOX_SERVER_HOST=0.0.0.0
      - AIINBOX_DATABASE_DRIVER=postgres
      - AIINBOX_DATABASE_DSN=host=db user=${DB_USER:-aiinbox} password=${DB_PASSWORD} dbname=${DB_NAME:-aiinbox} port=5432 sslmode=disable
      - AIINBOX_AUTH_JWT_SECRET=${JWT_SECRET}
      - AIINBOX_CORS_ALLOWED_ORIGINS=${FRONTEND_URL:-http://localhost:3000},chrome-extension://*
    volumes:
      - export_data:/app/data/exports
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-aiinbox}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-aiinbox}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiinbox}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  export_data:
